{% extends "base.html" %}
{%  block head %}
    {{ super() }}
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/clock.css') }}" />
    <script type='module' src="{{ url_for('static', filename='js/clock.js') }}" ></script>
{%  endblock head %}
{%  block title %}{{ title }}{%  endblock title %}
{% block content %}
    <div id="clock-container" class="clock-container container">
        <div class="four-digits">
            {% for d in range(4) %}
            <div class="one-digit">
                {% for c in range(6) %}
                <div class="clock">
                    <div id="clockface--{{ d }}{{ c }}" class="clock-face">
                        <div class="ticks"></div>
                        <div class="hand hoursHand"></div>
                        <div class="hand minutesHand"></div>
                        <div class="center-peg"></div>
                    </div>
                    <div id="label--{{d}}{{c}}" class="label" ></div>
                </div>
                {% endfor %}
            </div>
            {% endfor %}
        </div>
    </div>
    <div id="trigger-container" class="row d-flex p-0">
        <div class="trigger trigger--left"></div>
        <div class="trigger trigger--right"></div>
    </div>
{% endblock content %}

{% block script %}
{{ super() }}
    <script type='text/javascript' src="../../static/js/circletype.min.js" ></script>
    <script type='text/javascript' src="../../static/js/require.min.js"></script>
{% endblock script %}
